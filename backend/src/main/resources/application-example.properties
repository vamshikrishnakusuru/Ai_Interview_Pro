spring.application.name=backend
spring.datasource.url=jdbc:mysql://localhost:3306/ai_interview_db?createDatabaseIfNotExist=true&serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# JWT Configuration
# MUST be set in system environment variables (JWT_SECRET) or passed on startup.
# Must be Base64-encoded.
aiinterview.app.jwtSecret=${JWT_SECRET}
aiinterview.app.jwtExpirationMs=86400000

# File Upload
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Gemini AI Configuration
# Set GEMINI_API_KEY environment variable. If missing, Gemini features will run in fallback/offline mode.
gemini.api.key=${GEMINI_API_KEY:}
gemini.api.url=https://generativelanguage.googleapis.com/v1/models/gemini-pro:generateContent
